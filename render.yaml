services:
  - type: web
    name: whatsapp-session-manager
    env: node
    rootDir: session-manager
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SESSION_ENCRYPTION_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: SESSION_MANAGER_SECRET
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: PORT
        value: 3001
