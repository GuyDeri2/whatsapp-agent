name: Keep Render Server Alive

on:
  schedule:
    # Run every 14 minutes to prevent Render free tier from sleeping (sleeps after 15m)
    - cron: '*/14 * * * *'
  # Allow manual triggering from the GitHub Actions UI
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint
        run: |
          echo "Pinging Render health endpoint..."
          curl -sS https://whatsapp-agent-rl0k.onrender.com/health
          echo -e "\nPing complete."
